# ─────────────────────────────────────────────────────────────────────────────
# yeet — Cloudflare Worker that signs R2 multipart uploads (browser → R2 direct)
# and serves the SPA static assets from ../FE/dist (single combined deployment).
#
# ── One-time setup ───────────────────────────────────────────────────────────
#   1. Create the KV namespace and paste its id into [[kv_namespaces]] below:
#        wrangler kv namespace create YEET
#   2. Store the R2 S3-API credentials as SECRETS (never commit these):
#        wrangler secret put R2_ACCESS_KEY_ID
#        wrangler secret put R2_SECRET_ACCESS_KEY
#
# ── Toggle uploads on/off (the YEET KV "kill switch") ────────────────────────
#   Enable:   wrangler kv key put --binding=YEET uploads:enabled true
#   Disable:  wrangler kv key put --binding=YEET uploads:enabled false
#   (When not exactly "true", all /api/uploads* endpoints return 403.)
#
# ── Deploy (order matters — build the FE first so ../FE/dist exists) ─────────
#        cd ../FE && npm run build
#        cd ../BE && wrangler deploy
# ─────────────────────────────────────────────────────────────────────────────

name = "yeet"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# The Worker is served from its custom domain, so disable the auto-generated
# workers.dev route and the per-version preview URLs.
workers_dev = false
preview_urls = false

# Static assets: the built SPA. `env.ASSETS.fetch(request)` serves these, and
# `single-page-application` rewrites unknown paths to index.html for client routing.
[assets]
directory = "../FE/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
# Route /api/* to the Worker BEFORE the static-asset handler. Without this, the
# SPA asset handler intercepts these paths first and returns a bare 405 for any
# non-GET method (POST/DELETE), so the Worker's own /api handlers never run.
# Everything else still serves as a static asset (no Worker invocation).
run_worker_first = ["/api/*"]

# General-purpose settings store. Keys are namespaced (e.g. "uploads:enabled").
# Replace the placeholder id with the one printed by `wrangler kv namespace create YEET`.
[[kv_namespaces]]
binding = "YEET"
id = "48ddded7b01a4f0baca8895b9c3c1d2d"

# Non-secret config. R2_ACCOUNT_ID is not sensitive; the S3 credentials are
# stored as secrets (see setup above), NOT here.
[vars]
R2_ACCOUNT_ID = "49b824240b73d2b0614e6cf122559874"
R2_BUCKET = "horde"
# Public base URL for completed objects — the bucket's custom domain. Returned
# as `location` from /complete so the browser gets a publicly-fetchable link
# (the r2.cloudflarestorage.com S3 endpoint requires SigV4 and is NOT public).
# No trailing slash.
PUBLIC_BASE = "https://hoard.bfportal.gg"
